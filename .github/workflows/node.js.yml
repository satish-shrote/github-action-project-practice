name: Node.js CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Build app
      run: npm run build

    - name: Run tests
      run: npm test --if-present

    # ✅ Upload build output
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: react-build
        path: build